<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bk:#1a1a1a;--green:#34C759;--red:#FF3B2F;--yellow:#FFCC00;--blue:#0064D2;
  --ivory:#f5f0e8;--white:#ffffff;--gray:#888780;
}
html,body{height:100%;font-family:'Noto Sans KR',sans-serif;overflow:hidden;}

/* THEME */
body.light{background:var(--ivory);}
body.dark{background:#0d0d0d;--muted:rgba(255,255,255,.55);}

#app{width:100%;max-width:390px;height:100%;margin:0 auto;display:flex;flex-direction:column;position:relative;overflow:hidden;}
body.light #app{background:var(--ivory);}
body.dark #app{background:#0d0d0d;}

/* SCREENS */
.screen{position:absolute;inset:0;display:flex;flex-direction:column;overflow-y:auto;overflow-x:hidden;transition:transform .3s ease,opacity .3s;}
.screen.hidden{transform:translateX(100%);opacity:0;pointer-events:none;}
body.light .screen{background:var(--ivory);}
body.dark .screen{background:#0d0d0d;}

/* HEADER */
.hdr{display:flex;justify-content:space-between;align-items:center;padding:10px 16px 9px;border-bottom:3px solid var(--bk);gap:8px;}
body.light .hdr{background:var(--bk);}
body.dark .hdr{background:#000;border-color:#000;}
.logo{font-family:'Black Han Sans',sans-serif;font-size:22px;letter-spacing:.08em;color:#fff;}
.hdr-right{display:flex;align-items:center;gap:10px;}
.dots{display:flex;gap:5px;}
.dot{width:8px;height:8px;border-radius:50%;}
.theme-tog{background:none;border:none;cursor:pointer;font-size:22px;padding:2px 4px;line-height:1;touch-action:manipulation;transition:transform .15s;}
.theme-tog:active{transform:scale(.85);}
.theme-tog:active{transform:scale(0.92);}
body.light .theme-tog{border-color:rgba(0,0,0,.18)!important;background:rgba(0,0,0,.06)!important;}

/* STATUS CARD */
.st-card{margin:12px 14px 9px;border-radius:20px;border:3px solid var(--bk);padding:16px 16px 13px;position:relative;overflow:hidden;box-shadow:4px 4px 0 var(--bk);}
body.dark .st-card{box-shadow:0 0 0 1px #111,4px 4px 0 #000;}
.st-bubble{position:absolute;top:-24px;right:-24px;width:90px;height:90px;border-radius:50%;background:rgba(0,0,0,.1);}
.st-eyebrow{font-family:'Space Mono',monospace;font-size:14px;font-weight:700;letter-spacing:.15em;margin-bottom:6px;}
.st-word{font-family:'Black Han Sans',sans-serif;line-height:.88;transition:font-size .2s;}
.st-badge{margin-top:10px;border-radius:10px;padding:5px 10px;display:inline-flex;align-items:center;gap:6px;background:rgba(0,0,0,.18);}
.st-badge-txt{font-size:15px;font-weight:700;color:#fff;letter-spacing:.04em;}

/* FASTING CARD */
.fast-card{margin:0 14px 9px;border-radius:16px;border:3px solid var(--bk);padding:11px 13px;box-shadow:3px 3px 0 var(--bk);}
body.dark .fast-card{box-shadow:2px 2px 0 #000;}
.fast-card.yellow{background:var(--yellow);}
body.dark .fast-card.neutral{background:#1a1a1a;border-color:#2a2a2a;box-shadow:none;}
body.light .fast-card.neutral{background:var(--white);border-color:var(--bk);}
.fc-lbl{font-family:'Space Mono',monospace;font-size:16px;font-weight:700;letter-spacing:.12em;margin-bottom:5px;}
.fast-card.yellow .fc-lbl{color:rgba(0,0,0,.42);}
body.dark .fast-card.neutral .fc-lbl{color:#aaa;}
body.light .fast-card.neutral .fc-lbl{color:#aaa;}
.fc-val{font-family:'Space Mono',monospace;font-size:26px;font-weight:700;line-height:1;}
.fast-card.yellow .fc-val{color:#000;}
body.dark .fast-card.neutral .fc-val{color:#fff;}
body.light .fast-card.neutral .fc-val{color:var(--bk);}
.fc-sub{font-size:15px;margin-top:5px;}
.fast-card.yellow .fc-sub{color:rgba(0,0,0,.42);}
body.dark .fast-card.neutral .fc-sub{color:#aaa;}
body.light .fast-card.neutral .fc-sub{color:#999;}
.fc-bar{height:6px;border-radius:99px;margin-top:9px;overflow:hidden;}
.fast-card.yellow .fc-bar{background:rgba(0,0,0,.15);}
.fc-fill{height:6px;background:var(--bk);border-radius:99px;}
.fc-labels{display:flex;justify-content:space-between;margin-top:6px;}
.fc-labels span{font-size:16px;}
.fast-card.yellow .fc-labels span{color:rgba(0,0,0,.38);}
.fast-card.yellow .fc-labels .mid{color:#000;font-weight:700;}
.fc-chips{display:flex;gap:5px;margin-top:7px;flex-wrap:wrap;}
.chip{font-size:16px;padding:2px 7px;border-radius:99px;}
.chip.done{background:rgba(0,0,0,.2);color:#000;}
.chip.next{background:rgba(0,0,0,.12);color:#000;border:1px solid rgba(0,0,0,.22);}
.chip.todo{background:rgba(0,0,0,.1);color:rgba(0,0,0,.42);}

/* MSG CARD */
.msg-card{margin:0 14px 9px;border-radius:14px;border:2.5px solid var(--bk);padding:10px 12px;display:flex;align-items:center;gap:10px;}
body.light .msg-card{background:var(--white);box-shadow:3px 3px 0 var(--bk);}
body.dark .msg-card{background:#1a1a1a;border-color:#2a2a2a;box-shadow:none;}
.msg-icon-wrap{width:34px;height:34px;border-radius:9px;border:2px solid var(--bk);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
body.dark .msg-icon-wrap{border-color:#2a2a2a;}
.msg-title{font-size:16px;font-weight:900;margin-bottom:2px;}
body.light .msg-title{color:var(--bk);}
body.dark .msg-title{color:#fff;}
.msg-sub{font-size:14px;}
body.light .msg-sub{color:#888;}
body.dark .msg-sub{color:#87CEEB;}

/* ACTION BTNS */
.act-row{display:flex;gap:8px;padding:0 14px 10px;}
.act-btn{flex:1;border:2.5px solid var(--bk);border-radius:12px;padding:0;height:58px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .12s;touch-action:manipulation;}
body.light .act-btn{box-shadow:3px 3px 0 var(--bk);}
body.dark .act-btn{border-color:#2a2a2a;box-shadow:2px 2px 0 #000;}
.act-btn:active{transform:scale(0.95);}
.act-btn.red{background:var(--red);}
.act-btn.blue{background:var(--blue);}
.act-inner{display:flex;align-items:center;justify-content:center;gap:5px;}
.act-txt{font-size:15px;font-weight:900;color:#fff;}

/* NAV */
.nav{display:flex;justify-content:space-around;padding:10px 16px 14px;flex-shrink:0;}
body.light .nav{background:var(--bk);border-top:3px solid #000;}
body.dark .nav{background:#000;border-top:2px solid #1a1a1a;}
.nav-btn{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;transition:transform .12s;touch-action:manipulation;}
.nav-btn:active{transform:scale(0.9);}
body.light .nav-btn.inactive{background:#2a2a2a;}
body.dark .nav-btn.inactive{background:#1a1a1a;}

/* SHEET */
.sheet{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:390px;border-radius:24px 24px 0 0;z-index:100;transition:transform .35s cubic-bezier(.4,0,.2,1);max-height:90vh;overflow-y:auto;border-top:3px solid var(--bk);}
body.light .sheet{background:var(--white);}
body.dark .sheet{background:#161616;}
.sheet.hidden{transform:translate(-50%,100%);}
.sheet-handle{width:40px;height:4px;border-radius:99px;margin:12px auto 0;}
body.light .sheet-handle{background:rgba(0,0,0,.15);}
body.dark .sheet-handle{background:rgba(255,255,255,.15);}
.sheet-title{font-size:18px;font-weight:900;padding:12px 16px 3px;}
body.light .sheet-title{color:var(--bk);}
body.dark .sheet-title{color:#fff;}
.sheet-sub{font-size:14px;padding:0 16px 12px;}
body.light .sheet-sub{color:#888;}
body.dark .sheet-sub{color:#bbb;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:99;transition:opacity .3s;}
.overlay.hidden{opacity:0;pointer-events:none;}

.sec-lbl{font-family:'Space Mono',monospace;font-size:14px;font-weight:700;letter-spacing:.12em;padding:0 16px 7px;display:block;}
body.light .sec-lbl{color:#aaa;}
body.dark .sec-lbl{color:#aaa;}

input[type=time]{border-radius:10px;padding:9px 14px;font-family:'Space Mono',monospace;font-size:1rem;outline:none;margin:0 16px 14px;width:calc(100% - 32px);}
body.light input[type=time]{background:#f0ede6;border:2px solid var(--bk);color:var(--bk);}
body.dark input[type=time]{background:#1a1a1a;border:1.5px solid #2a2a2a;color:#fff;}
input[type=time]:focus{border-color:var(--green);}
body.dark input[type=time]::-webkit-calendar-picker-indicator{filter:invert(1);opacity:.8;cursor:pointer;}
body.dark input[type=time]::-webkit-datetime-edit{color:#fff;}
body.light input[type=time]::-webkit-calendar-picker-indicator{opacity:.6;cursor:pointer;}

.food-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:0 16px 14px;}
.food-item{border-radius:12px;padding:9px 4px 7px;text-align:center;cursor:pointer;border:2.5px solid transparent;transition:all .15s;touch-action:manipulation;}
body.light .food-item{background:#f0ede6;}
body.dark .food-item{background:#1a1a1a;}
.food-item.sel-r{background:rgba(255,59,47,.22)!important;border-color:var(--red)!important;}
.food-item.sel-g{background:rgba(52,199,89,.22)!important;border-color:var(--green)!important;}
.food-item .fi-nm{font-size:15px;margin-top:3px;display:block;}
body.light .food-item .fi-nm{color:#888;}
body.dark .food-item .fi-nm{color:#ccc;}
.food-item.sel-r .fi-nm{color:var(--red)!important;font-weight:700!important;}
.food-item.sel-g .fi-nm{color:var(--green)!important;font-weight:700!important;}

.qty-row{display:flex;gap:8px;padding:0 16px 14px;}
.qty-btn{flex:1;border-radius:10px;padding:8px 0;text-align:center;font-size:16px;cursor:pointer;border:2px solid transparent;transition:all .15s;touch-action:manipulation;}
body.light .qty-btn{background:#f0ede6;color:#888;border-color:#ddd;}
body.dark .qty-btn{background:#1e1e1e;color:#ccc;border-color:#333;}
.qty-btn.sel-r{background:rgba(255,59,47,.22)!important;color:var(--red)!important;border-color:var(--red)!important;font-weight:700!important;}
.qty-btn.sel-g{background:rgba(52,199,89,.22)!important;color:var(--green)!important;border-color:var(--green)!important;font-weight:700!important;}

.preview-box{margin:0 16px 12px;border-radius:13px;padding:10px 13px;border:2px solid var(--yellow);background:rgba(255,204,0,.1);}
.preview-box .pb-lbl{font-family:'Space Mono',monospace;font-size:14px;font-weight:700;color:#997700;letter-spacing:.08em;margin-bottom:7px;}
body.dark .preview-box .pb-lbl{color:var(--yellow);}
.pb-row{display:flex;justify-content:space-between;margin-bottom:3px;}
.pb-k{font-size:16px;}
body.light .pb-k{color:#888;}
body.dark .pb-k{color:#bbb;}
.pb-v{font-size:16px;font-weight:700;}
body.light .pb-v{color:var(--bk);}
body.dark .pb-v{color:#fff;}
.pb-v.g{color:var(--green);}

.sheet-cta{margin:4px 16px 0;border-radius:13px;padding:13px;text-align:center;font-size:16px;font-weight:900;border:3px solid var(--bk);cursor:pointer;width:calc(100% - 32px);touch-action:manipulation;}
body.dark .sheet-cta{border-color:#2a2a2a;}
.sheet-cta.red{background:var(--red);color:#fff;}
.sheet-cta.green{background:var(--green);color:#000;}

.divider{height:2px;margin:0 16px 12px;}
body.light .divider{background:rgba(0,0,0,.08);}
body.dark .divider{background:rgba(255,255,255,.08);}

/* SCIENCE + SETTINGS */
.page-hd{display:flex;align-items:center;gap:10px;padding:12px 16px 8px;}
.back-btn{width:34px;height:34px;border-radius:50%;border:2.5px solid var(--bk);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;font-weight:900;}
body.light .back-btn{background:var(--white);color:var(--bk);}
body.dark .back-btn{background:#1a1a1a;border-color:#333;color:#fff;}
.page-title{font-family:'Black Han Sans',sans-serif;font-size:18px;letter-spacing:.04em;}
body.light .page-title{color:var(--bk);}
body.dark .page-title{color:#fff;}

.sci-item{margin:0 14px 9px;border-radius:14px;border:2.5px solid;overflow:hidden;}
body.light .sci-item{border-color:var(--bk);box-shadow:2px 2px 0 var(--bk);}
body.dark .sci-item{border-color:#2a2a2a;}
.sci-hd{display:flex;align-items:flex-start;gap:10px;padding:11px 13px;cursor:pointer;}
body.light .sci-hd{background:var(--white);}
body.dark .sci-hd{background:#1a1a1a;}
.sci-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:3px;border:2px solid var(--bk);}
body.dark .sci-dot{border-color:#333;}
.sci-claim{font-size:14px;font-weight:900;flex:1;line-height:1.45;}
body.light .sci-claim{color:var(--bk);}
body.dark .sci-claim{color:#fff;}
.sci-chev{font-size:14px;flex-shrink:0;margin-top:1px;transition:transform .2s;}
body.light .sci-chev{color:#888;}
body.dark .sci-chev{color:#aaa;}
.sci-chev.open{transform:rotate(180deg);}
.sci-body{padding:0 13px 12px 32px;border-top:2px solid;}
body.light .sci-body{border-color:rgba(0,0,0,.08);}
body.dark .sci-body{border-color:#2a2a2a;}
body.light .sci-body-bg{background:var(--white);}
body.dark .sci-body-bg{background:#1a1a1a;}
.sci-sum{font-size:14px;line-height:1.75;padding-top:10px;margin-bottom:8px;}
body.light .sci-sum{color:#555;}
body.dark .sci-sum{color:#ccc;}
.sci-level{font-family:'Space Mono',monospace;font-size:14px;font-weight:700;color:var(--yellow);margin-bottom:5px;letter-spacing:.06em;}
.sci-src{font-size:15px;}
body.light .sci-src{color:#aaa;}
body.dark .sci-src{color:#aaa;}
.sci-src a{color:var(--green);}

.disclaimer-box{margin:8px 14px 12px;border-radius:13px;border-left:3px solid var(--yellow);padding:10px 12px;}
body.light .disclaimer-box{background:rgba(255,204,0,.08);}
body.dark .disclaimer-box{background:rgba(255,204,0,.06);}
.disclaimer-box strong{display:block;font-size:15px;letter-spacing:.08em;color:var(--yellow);margin-bottom:5px;}
.disclaimer-box p{font-size:16px;line-height:1.8;}
body.light .disclaimer-box p{color:#666;}
body.dark .disclaimer-box p{color:#d0d0d0;}

.set-row{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:2px solid;}
body.light .set-row{border-color:rgba(0,0,0,.07);}
body.dark .set-row{border-color:rgba(255,255,255,.05);}
.set-left{display:flex;align-items:center;gap:10px;}
.set-icon-box{width:34px;height:34px;border-radius:10px;border:2px solid var(--bk);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
body.dark .set-icon-box{border-color:#2a2a2a;}
.set-name{font-size:15px;font-weight:700;}
body.light .set-name{color:var(--bk);}
body.dark .set-name{color:#fff;}
.set-desc{font-size:15px;margin-top:1px;}
body.light .set-desc{color:#aaa;}
body.dark .set-desc{color:#bbb;}
.tog{width:42px;height:24px;border-radius:12px;position:relative;cursor:pointer;border:2px solid var(--bk);transition:background .2s;touch-action:manipulation;}
body.dark .tog{border-color:#333;}
.tog.on{background:var(--green);}
.tog.off{background:rgba(0,0,0,.12);}
body.dark .tog.off{background:rgba(255,255,255,.1);}
.tog-k{width:18px;height:18px;border-radius:50%;background:#fff;position:absolute;top:1px;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.3);}
.tog.on .tog-k{left:21px;}
.tog.off .tog-k{left:1px;}

/* ONBOARDING */
.ob-wrap{flex:1;display:flex;flex-direction:column;padding:2rem 1.5rem;min-height:100%;}
.ob-logo{font-family:'Black Han Sans',sans-serif;font-size:2.8rem;letter-spacing:.1em;}
.ob-tag{font-family:'Space Mono',monospace;font-size:.65rem;letter-spacing:.14em;margin-bottom:2.5rem;}
body.light .ob-tag{color:#888;}
body.dark .ob-tag{color:#aaa;}
.ob-title{font-size:1.5rem;font-weight:900;line-height:1.3;margin-bottom:.85rem;}
body.light .ob-title{color:var(--bk);}
body.dark .ob-title{color:#fff;}
.ob-desc{font-size:1rem;line-height:1.85;margin-bottom:1.5rem;}
body.light .ob-desc{color:#666;}
body.dark .ob-desc{color:#e8e8e8;}
body.dark .ob-desc strong{color:#fff;}
.ob-label{font-family:'Space Mono',monospace;font-size:.78rem;font-weight:700;letter-spacing:.08em;margin-bottom:.5rem;display:block;}
body.light .ob-label{color:#aaa;}
body.dark .ob-label{color:#ccc;}
input[type=number]{width:100%;border-radius:10px;padding:.8rem 1rem;font-family:'Noto Sans KR',sans-serif;font-size:1rem;outline:none;margin-bottom:1.2rem;}
body.light input[type=number]{background:#f0ede6;border:2.5px solid var(--bk);color:var(--bk);}
body.dark input[type=number]{background:#1a1a1a;border:2px solid #2a2a2a;color:#fff;}
input[type=number]:focus{border-color:var(--green);}
.seg{display:flex;border-radius:10px;overflow:hidden;border:2.5px solid var(--bk);margin-bottom:1.2rem;}
body.dark .seg{border-color:#2a2a2a;}
.seg-btn{flex:1;padding:.75rem .5rem;text-align:center;font-size:.95rem;font-weight:700;cursor:pointer;border:none;transition:all .18s;touch-action:manipulation;}
body.light .seg-btn{background:#f0ede6;color:#888;}
body.dark .seg-btn{background:#1e1e1e;color:#bbb;}
.seg-btn.act-g{background:var(--green)!important;color:#000!important;}
.seg-btn.act-r{background:var(--red)!important;color:#fff!important;}
.seg-btn.act-b{background:var(--blue)!important;color:#fff!important;}
.ob-cta{width:100%;border:3px solid var(--bk);border-radius:13px;padding:1rem;font-family:'Noto Sans KR',sans-serif;font-size:1rem;font-weight:900;cursor:pointer;margin-top:auto;transition:transform .15s;}
body.dark .ob-cta{border-color:#333;}
.ob-cta.green{background:var(--green);color:#000;}
.ob-cta.yellow{background:var(--yellow);color:#000;}
.ob-cta:active{transform:scale(0.97);}

::-webkit-scrollbar{width:0;}
input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
input[type=number]{-moz-appearance:textfield;}
.fade-in{animation:fi .35s ease forwards;}

function pxSvg(grid, palette, sz=3) {
  const rows=grid.length, cols=grid[0].length;
  const w=cols*sz, h=rows*sz;
  let s=`<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg" style="display:block;image-rendering:pixelated;shape-rendering:crispEdges;">`;
  for(let r=0;r<rows;r++) for(let c=0;c<cols;c++){
    const v=grid[r][c];
    if(v!==null&&v!==undefined){
      const col=palette[v]||v;
      if(col) s+=`<rect x="${c*sz}" y="${r*sz}" width="${sz}" height="${sz}" fill="${col}"/>`;
    }
  }
  return s+'</svg>';
}

// 공복 타이머: 시:분 표기
const fmtHM = ms => {
  if(!ms||ms<0) return '--:--';
  const totalSec=Math.floor(ms/1000);
  const h=Math.floor(totalSec/3600), m=Math.floor((totalSec%3600)/60);
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
};
// DO 카운트다운: 시간>1h면 "Xh Xm", 아니면 "Xm Xs" 형태로 반환
const fmtCountdown = ms => {
  if(!ms||ms<0) return {primary:'00:00', unit:'분:초', h:0, m:0, s:0};
  const totalSec=Math.floor(ms/1000);
  const h=Math.floor(totalSec/3600);
  const m=Math.floor((totalSec%3600)/60);
  const s=totalSec%60;
  if(h>0){
    return {primary:`${h}시간 ${String(m).padStart(2,'0')}분`, unit:'남음', h,m,s};
  }
  return {primary:`${String(m).padStart(2,'0')}분 ${String(s).padStart(2,'0')}초`, unit:'남음', h,m,s};
};
// 하위 호환용
const fmtMM = ms => {
  if(!ms||ms<0) return '00:00';
  const totalSec=Math.floor(ms/1000);
  const m=Math.floor(totalSec/60), s=totalSec%60;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
};

};

function calcState() {
  if(!S.lastMeal) return {state:'DO',msRemain:0,fastMs:0,first:true};
  const mealMs = new Date(S.lastMeal.time).getTime();
  const sinceMs = S.now - mealMs;
  const f = FOODS.find(x=>x.id===S.lastMeal.foodType)||FOODS[0];
  let base = f.base * 3600000;
  if(S.lastMeal.qty==='small') base -= 18*60000;
  if(S.lastMeal.qty==='large') base += 30*60000;
  const age = parseInt(S.profile.age)||30;
  if(age>=50) base+=45*60000; else if(age>=40) base+=30*60000;
  const h=parseInt(S.profile.height)||170, w=parseInt(S.profile.weight)||70;
  const bmi = w/((h/100)**2);
  if(bmi>=30) base+=60*60000; else if(bmi>=25) base+=30*60000;
  const ef = parseInt(S.profile.exFreq)||3;
  if(ef>=4) base-=30*60000; else if(ef<=1) base+=20*60000;
  if(S.lastEx) {
    const exMs = new Date(S.lastEx.time).getTime();
    if(S.now - exMs < 7200000) {
      const e = EXERCISES.find(x=>x.id===S.lastEx.type)||EXERCISES[0];
      const mult = S.lastEx.intensity==='hard'?1.5:S.lastEx.intensity==='moderate'?1.0:0.6;
      base -= e.red * 3600000 * mult;
    }
  }
  base = Math.max(1800000, base);
  const remain = base - sinceMs;
  return {state:remain>0?'DONT':'DO', msRemain:Math.max(0,remain), fastMs:sinceMs};
}

        <span class="sec-lbl" style="margin-top:.25rem;">운동 종료 시간</span>
        <input type="time" id="ex-time" value="${S.sf.exTime||nowT()}" onchange="S.sf.exTime=this.value" oninput="S.sf.exTime=this.value">
        <span class="sec-lbl">운동 종류</span>
        <div class="food-grid">
          ${EXERCISES.map(ex=>`<div class="food-item ${S.sf.exType===ex.id?'sel-g':''}" onclick="S.sf.exType='${ex.id}';render()">
            <span style="font-size:1.4rem;">${ex.emoji}</span>
            <span class="fi-nm">${ex.label}</span>
          </div>`).join('')}
        </div>
        <span class="sec-lbl">강도는요?</span>
        <div class="qty-row">
          <button class="qty-btn ${S.sf.intensity==='light'?'sel-g':''}" onclick="S.sf.intensity='light';render()">가볍게</button>
          <button class="qty-btn ${S.sf.intensity==='moderate'?'sel-g':''}" onclick="S.sf.intensity='moderate';render()">보통</button>
          <button class="qty-btn ${S.sf.intensity==='hard'?'sel-g':''}" onclick="S.sf.intensity='hard';render()">격하게</button>
        </div>
        <div class="divider"></div>
        <div class="preview-box" style="border-color:#34C759;background:rgba(52,199,89,.1);">
          <div class="pb-lbl" style="color:#34C759;">DOD 예측</div>
          ${S.lastMeal?`<div class="pb-row"><span class="pb-k">DO 타임 단축</span><span class="pb-v g">약 ${redMin}분 앞당겨짐</span></div>`:'<div class="pb-row"><span class="pb-k">식사 기록 후 계산 가능</span><span class="pb-v">—</span></div>'}
        </div>
        <button class="sheet-cta green" onclick="saveEx()" style="margin-bottom:20px;">기록 완료</button>
      </div>
      <div class="overlay" onclick="closeSheet()"></div>`;
    }
  }

  app.innerHTML = html;
  setTimeout(updateClock, 0);
}

function setRow(iconHtml, iconBg, name, desc, key) {
  const on = S.alarms[key];
  return `<div class="set-row">
    <div class="set-left">
      <div class="set-icon-box" style="background:${iconBg};">${iconHtml}</div>
      <div><div class="set-name">${name}</div><div class="set-desc">${desc}</div></div>
    </div>
    <button class="tog ${on?'on':'off'}" onclick="toggleAlarm('${key}')"><div class="tog-k"></div></button>
  </div>`;
}

// ── ACTIONS ───────────────────────────────────────────────
function nextOb()   { S.obStep++; render(); }
function setGender(g){ S.profile.gender=g; render(); }
function setEx(n)   { S.profile.exFreq=n; render(); }
function setSleep(n){ S.profile.sleep=n; render(); }
function saveBody() {
  // Values already synced via oninput handlers
  const ageEl = document.getElementById('f-age');
  const hEl   = document.getElementById('f-height');
  const wEl   = document.getElementById('f-weight');
  if(ageEl)    S.profile.age    = parseInt(ageEl.value)    || S.profile.age;
  if(hEl)      S.profile.height = parseInt(hEl.value)      || S.profile.height;
  if(wEl)      S.profile.weight = parseInt(wEl.value)      || S.profile.weight;
  S.obStep = 2; saveToStorage(); render();
}
function finishOb()  { S.screen='main'; saveToStorage(); render(); }
function goOb()      { S.obStep=1; S.screen='onboard'; render(); }
function goScreen(s) { S.screen=s; render(); }
function openSheet(t){ S.sheet=t; S.sf.mealTime=nowT(); S.sf.exTime=nowT(); render(); }
function closeSheet(){ S.sheet=null; render(); }
function toggleAlarm(k){ S.alarms[k]=!S.alarms[k]; saveToStorage(); render(); }
function toggleSci(id){ S.sciOpen[id]=!S.sciOpen[id]; render(); }
function toggleTheme(){ S.theme=S.theme==='light'?'dark':'light'; saveToStorage(); render(); }

function saveMeal() {
  const t = document.getElementById('meal-time')?.value||nowT();
  const [hh,mm] = t.split(':');
  const d = new Date(); d.setHours(parseInt(hh),parseInt(mm),0,0);
  if(d > new Date()) d.setDate(d.getDate()-1);
  S.lastMeal = {time:d.toISOString(), foodType:S.sf.foodType, qty:S.sf.qty};
  saveToStorage();
  S.sheet=null; render();
}
function saveEx() {
  const t = document.getElementById('ex-time')?.value||nowT();
  const [hh,mm] = t.split(':');
  const d = new Date(); d.setHours(parseInt(hh),parseInt(mm),0,0);
  if(d > new Date()) d.setDate(d.getDate()-1);
  S.lastEx = {time:d.toISOString(), type:S.sf.exType, intensity:S.sf.intensity};
  saveToStorage();
  S.sheet=null; render();
}


function pickFood(el) {
  const id = el.getAttribute('data-id');
  if(id) { S.sf.foodType = id; render(); }
}
function pickEx(el) {
  const id = el.getAttribute('data-id');
  if(id) { S.sf.exType = id; render(); }
}

// ── 타이머 전용 업데이트 (깜빡임 없이 숫자만 교체) ────────────────

function updateClock() {
  const el = document.getElementById('hdr-clock');
  if(!el) return;
  const now = new Date();
  const hh = String(now.getHours()).padStart(2,'0');
  const mm = String(now.getMinutes()).padStart(2,'0');
  const ss = String(now.getSeconds()).padStart(2,'0');
  const days = ['일','월','화','수','목','금','토'];
  const day = days[now.getDay()];
  const dateStr = `${now.getMonth()+1}월 ${now.getDate()}일 (${day})`;
  const isDark = document.body.className === 'dark';
  const clr = isDark ? '#87CEEB' : '#1565C0';
  el.innerHTML = `
    <div style="font-family:'Space Mono',monospace;font-size:15px;font-weight:700;color:${clr};letter-spacing:.04em;line-height:1.1;">${hh}:${mm}:<span style="font-size:12px;">${ss}</span></div>
    <div style="font-size:11px;font-weight:500;color:${clr};opacity:.8;letter-spacing:.02em;">${dateStr}</div>
  `;
}
function tickTimers() {
  updateClock();
  S.now = Date.now();
  if(S.screen !== 'main' || S.sheet) return;
  const st = calcState();

  if(st.state === 'DONT') {
    // DON'T: 주황 카운트다운 업데이트
    const cd = fmtCountdown(st.msRemain);
    const elP = document.getElementById('cd-primary');
    const elH = document.getElementById('cd-h');
    const elM = document.getElementById('cd-m');
    const elS = document.getElementById('cd-s');
    if(elP) elP.textContent = cd.primary;
    if(elH) elH.textContent = String(cd.h).padStart(2,'0');
    if(elM) elM.textContent = String(cd.m).padStart(2,'0');
    if(elS) elS.textContent = String(cd.s).padStart(2,'0');
    const elDontFast = document.getElementById('dont-fast-hm');
    if(elDontFast) elDontFast.textContent = fmtHM(st.fastMs);

    // DO 달성 시점 감지 → 상태 전환 필요하면 full render
    if(st.msRemain <= 0) { render(); return; }

  } else {
    // DO: 공복 타이머 업데이트
    const elFast = document.getElementById('fast-hm');
    if(elFast) elFast.textContent = fmtHM(st.fastMs);

    // 14h/16h 마일스톤 뱃지 업데이트 (텍스트만)
    const ms14=50400000, ms16=57600000;
    const el14 = document.querySelector('.chip.next');
    if(el14 && st.fastMs < ms14) {
      const toNext = ms14 - st.fastMs;
      el14.textContent = '⏱ ' + Math.ceil(toNext/60000) + '분';
    }
  }
}


// ── localStorage 영구 저장 ────────────────────────────────
const STORAGE_KEY = 'dod_data_v1';

function saveToStorage() {
  try {
    const data = {
      profile: S.profile,
      lastMeal: S.lastMeal,
      lastEx: S.lastEx,
      alarms: S.alarms,
      theme: S.theme,
      obDone: S.screen !== 'onboard',
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  } catch(e) { console.warn('저장 실패:', e); }
}

function loadFromStorage() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const data = JSON.parse(raw);
    if (data.profile) S.profile = { ...S.profile, ...data.profile };
    if (data.lastMeal) S.lastMeal = data.lastMeal;
    if (data.lastEx)   S.lastEx   = data.lastEx;
    if (data.alarms)   S.alarms   = { ...S.alarms, ...data.alarms };
    if (data.theme)    S.theme    = data.theme;
    if (data.obDone)   S.screen   = 'main';
  } catch(e) { console.warn('불러오기 실패:', e); }
}

loadFromStorage();
setInterval(tickTimers, 1000);

// ── PWA 서비스 워커 등록 ─────────────────────────────────
if('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/DOD/sw.js')
      .then(r => console.log('SW 등록:', r.scope))
      .catch(e => console.log('SW 실패:', e));
  });
}

updateClock();
render();
</script>
